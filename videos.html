<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری ویدیوهای درمانی | کلینیک حکیم</title>
    <style>
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: #0b1320; color: white; text-align: center; }
        .header { padding: 40px 20px; background: #0f1c2e; border-bottom: 2px solid #d4af37; }
        h1 { color: #d4af37; margin: 0; }
        
        /* استایل پلیر */
        .player-container { max-width: 900px; margin: 20px auto; padding: 10px; background: #16263f; border-radius: 15px; display: none; }
        .player-container iframe { width: 100%; height: 450px; border: 2px solid #d4af37; border-radius: 10px; }

        /* استایل گالری */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px; max-width: 1200px; margin: auto; }
        .video-card { background: #1c2d46; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #2a3f5a; }
        .video-card:hover { transform: translateY(-10px); border-color: #d4af37; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .video-card img { width: 100%; height: 180px; object-fit: cover; }
        .video-card h3 { font-size: 1rem; padding: 15px; margin: 0; color: #eee; }

        .back-btn { display: inline-block; margin-top: 20px; color: #d4af37; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>نتایج درمان در کلینیک حکیم</h1>
        <a href="index.html" class="back-btn">← بازگشت به صفحه اصلی</a>
    </div>

    <!-- محل نمایش ویدیو پس از کلیک -->
    <div id="mainPlayer" class="player-container">
        <div id="videoPlaceholder"></div>
    </div>

    <div class="video-grid">
        <!-- ویدیو ۱ (jpg) -->
        <div class="video-card" onclick="playVideo('ipgw675')">
            <img src="stand12years.jpg" alt="درمان ۱۲ سال">
            <h3>بعد از ۱۲ سال ایستاد</h3>
        </div>

        <!-- ویدیوهای png -->
        <div class="video-card" onclick="playVideo('fbe93')">
            <img src="arthrosis.png" alt="آرتروز">
            <h3>آرتروز شدید زانو</h3>
        </div>

        <div class="video-card" onclick="playVideo('z1234')">
            <img src="asthma.png" alt="آسم">
            <h3>آسم کودکان</h3>
        </div>

        <div class="video-card" onclick="playVideo('b3210')">
            <img src="backpain.png" alt="کمردرد">
            <h3>کمردرد مقاوم</h3>
        </div>

        <div class="video-card" onclick="playVideo('l3344')">
            <img src="balance.png" alt="تعادل">
            <h3>درمان عدم تعادل</h3>
        </div>

        <div class="video-card" onclick="playVideo('n2986')">
            <img src="disc.png" alt="دیسک">
            <h3>درمان دیسک پاره</h3>
        </div>

        <div class="video-card" onclick="playVideo('v5962')">
            <img src="gallbladder.png" alt="صفرا">
            <h3>سنگ کیسه صفرا</h3>
        </div>

        <div class="video-card" onclick="playVideo('h7890')">
            <img src="heel.png" alt="خار پاشنه">
            <h3>درمان خار پاشنه</h3>
        </div>

        <div class="video-card" onclick="playVideo('m0257')">
            <img src="nausea.png" alt="تهوع">
            <h3>درمان تهوع</h3>
        </div>

        <div class="video-card" onclick="playVideo('q8573')">
            <img src="ovary.png" alt="تخمدان">
            <h3>کیست تخمدان</h3>
        </div>

        <div class="video-card" onclick="playVideo('p1122')">
            <img src="postop.png" alt="پس از عمل">
            <h3>بعد از عمل هم کنارتیم</h3>
        </div>

        <div class="video-card" onclick="playVideo('fbe93')">
            <img src="skin.png" alt="پوست">
            <h3>پوست مقاوم به درمان</h3>
        </div>

        <div class="video-card" onclick="playVideo('s9876')">
            <img src="spine.png" alt="نخاع">
            <h3>تنگی کانال نخاع</h3>
        </div>

        <div class="video-card" onclick="playVideo('y6483')">
            <img src="surgery.png" alt="جراحی">
            <h3>جراحی یاخچیدی</h3>
        </div>
    </div>

    <script>
        function playVideo(hash) {
            const playerDiv = document.getElementById('mainPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            
            playerDiv.style.display = 'block';
            placeholder.innerHTML = `<iframe src="https://www.aparat.com/video/video/embed/videohash/${hash}/vt/frame" allowFullScreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
            
            window.scrollTo({ top: 100, behavior: 'smooth' });
        }
    </script>

</body>
</html>
