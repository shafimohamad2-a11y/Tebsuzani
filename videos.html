<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آرشیو نتایج درمان | کلینیک حکیم</title>
    <style>
        :root { --gold: #d4af37; --bg: #0b1320; --card-bg: #16263f; }
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; text-align: center; }
        
        .header { padding: 40px 20px; background: #0f1c2e; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; }
        
        .player-container { max-width: 800px; margin: 30px auto; padding: 15px; background: var(--card-bg); border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 2px solid var(--gold); border-radius: 10px; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; max-width: 1000px; margin: auto; }
        .video-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #2a3f5a; }
        .video-card:hover { transform: scale(1.03); border-color: var(--gold); }
        .video-card img { width: 100%; height: 150px; object-fit: cover; }
        .video-card h3 { font-size: 0.9rem; padding: 10px; margin: 0; }
        
        .back-link { display: inline-block; margin-top: 20px; color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <header class="header">
        <h1>گلچین نتایج درمان</h1>
        <a href="index.html" class="back-link">← بازگشت به صفحه اصلی</a>
    </header>

    <div id="mainPlayer" class="player-container">
        <div class="responsive-iframe" id="videoPlaceholder"></div>
    </div>

    <div class="video-grid">
        <!-- کافیست نام فایل تصویر (png/jpg) را اینجا بگذارید -->
        <div class="video-card" onclick="playVideo('ipgw675')">
            <img src="stand12years.jpg" alt="درمان ۱۲ سال">
            <h3>بعد از ۱۲ سال ایستاد</h3>
        </div>
        <!-- بقیه کارت‌ها را به همین سبک اضافه کنید -->
    </div>

    <script>
        function playVideo(hash) {
            const playerDiv = document.getElementById('mainPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            playerDiv.style.display = 'block';
            placeholder.innerHTML = `<iframe src="https://www.aparat.com/video/video/embed/videohash/${hash}/vt/frame" allowFullScreen="true"></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
