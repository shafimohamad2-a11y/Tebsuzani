<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>درباره ما | کلینیک حکیم</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Vazirmatn',sans-serif;
margin:0;
background:#f4f7f6;
color:#222;
line-height:2;
}

.hero{
height:60vh;
background:url("https://images.unsplash.com/photo-1519823551278-64ac92734fb1") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
color:white;
text-align:center;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero h1{
position:relative;
z-index:2;
font-size:3rem;
color:#ffcc00;
}

.section{
padding:80px 20px;
display:flex;
justify-content:center;
}

.container{
max-width:900px;
}

.glass-box{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.bg1{
background:url("https://images.unsplash.com/photo-1544161515-4ab6ce6db874") center/cover fixed;
}

.bg2{
background:url("https://images.unsplash.com/photo-1576091160550-2173dba999ef") center/cover fixed;
}

.bg3{
background:url("https://images.unsplash.com/photo-1538108149393-fbbd81895907") center/cover fixed;
}

.section-title{
text-align:center;
font-size:2rem;
font-weight:800;
color:#1a4d2e;
margin-bottom:30px;
}

.back-home{
display:inline-block;
margin-top:40px;
background:#1a4d2e;
color:white;
padding:12px 30px;
border-radius:40px;
text-decoration:none;
}

.back-home:hover{
background:#0f2f1d;
}

@media(max-width:768px){

.hero h1{
font-size:2rem;
}

.glass-box{
padding:25px;
}

}

</style>
</head>

<body>

<section class="hero">
<h1>درباره کلینیک حکیم</h1>
</section>


<section class="section bg1">
<div class="container">
<div class="glass-box">

<div class="section-title">معرفی کلینیک</div>

<!-- متن فعلی خودت را دقیقاً اینجا قرار بده -->
<p>
متن فعلی شما بدون هیچ تغییری اینجا قرار می‌گیرد...
</p>

</div>
</div>
</section>


<section class="section bg2">
<div class="container">
<div class="glass-box">

<div class="section-title">رویکرد درمانی</div>

<p>
ادامه متن فعلی شما اینجا قرار می‌گیرد بدون تغییر...
</p>

</div>
</div>
</section>


<section class="section bg3">
<div class="container">
<div class="glass-box">

<div class="section-title">هدف ما</div>

<p>
بخش پایانی متن درباره ما بدون هیچ تغییری اینجا قرار می‌گیرد...
</p>

<a class="back-home" href="index.html">بازگشت به صفحه اصلی</a>

</div>
</div>
</section>


</body>
</html>
